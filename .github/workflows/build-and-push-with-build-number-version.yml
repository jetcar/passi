name: Build and Push Docker Images With Build Number

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOCKER_USERNAME: jetcar

jobs:
  build-common:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write build number to version files
        run: |
          BUILD_NUMBER="${{ github.run_number }}"
          printf "%s\n" "$BUILD_NUMBER" > WebApp/wwwroot/version.txt
          printf "%s\n" "$BUILD_NUMBER" > OpenIDC/wwwroot/version.txt
          echo "WebApp version.txt=$(cat WebApp/wwwroot/version.txt)"
          echo "OpenIDC version.txt=$(cat OpenIDC/wwwroot/version.txt)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tags
        id: version
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Build and push common image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: |
            jetcar/common_image:latest
            jetcar/common_image:${{ github.run_number }}
            jetcar/common_image:${{ steps.version.outputs.sha_short }}
            jetcar/common_image:${{ steps.version.outputs.branch }}
          cache-from: type=registry,ref=jetcar/common_image:latest
          cache-to: type=inline

  build-and-push:
    runs-on: ubuntu-latest
    needs: build-common
    strategy:
      matrix:
        include:
          - name: webapp
            dockerfile: WebApp/Dockerfile
            image: jetcar/webapp
          - name: passiwebapi
            dockerfile: passiwebapi/Dockerfile
            image: jetcar/passiwebapi
          - name: openidc
            dockerfile: OpenIDC/Dockerfile
            image: jetcar/openidc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tags
        id: version
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.run_number }}
            ${{ matrix.image }}:${{ steps.version.outputs.sha_short }}
            ${{ matrix.image }}:${{ steps.version.outputs.branch }}
          cache-from: type=registry,ref=${{ matrix.image }}:latest
          cache-to: type=inline

      - name: Image digest
        run: echo "Image built and pushed successfully for ${{ matrix.name }}"
