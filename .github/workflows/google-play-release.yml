name: Release Android To Google Play

on:
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track to publish to
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: Google Play release status
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
          - inProgress
          - halted
      display_version:
        description: Visible app version, for example 1.54
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: google-play-release
  cancel-in-progress: false

jobs:
  release-android:
    runs-on: windows-latest
    env:
      ANDROID_NATIVE_DIR: android-native
      PACKAGE_NAME: com.passi.cloud.passi_android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Remove local Android SDK override for CI
        shell: pwsh
        run: |
          $localProps = Join-Path $env:GITHUB_WORKSPACE 'android-native\local.properties'
          if (Test-Path $localProps) {
            Remove-Item $localProps -Force
          }

      - name: Materialize Android keystore
        shell: pwsh
        run: |
          $keystorePath = Join-Path $env:RUNNER_TEMP 'passi.keystore'
          [System.IO.File]::WriteAllBytes(
            $keystorePath,
            [System.Convert]::FromBase64String('${{ secrets.PASSI_ANDROID_KEYSTORE_BASE64 }}')
          )
          "PASSI_ANDROID_KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Materialize google-services.json
        shell: pwsh
        run: |
          $encoded = '${{ secrets.PASSI_ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}'
          if ([string]::IsNullOrWhiteSpace($encoded)) {
            throw 'Missing secret PASSI_ANDROID_GOOGLE_SERVICES_JSON_BASE64'
          }

          $googleServicesPath = Join-Path $env:GITHUB_WORKSPACE 'android-native\app\google-services.json'
          [System.IO.File]::WriteAllBytes(
            $googleServicesPath,
            [System.Convert]::FromBase64String($encoded)
          )

      - name: Set Android version metadata
        shell: pwsh
        run: |
          "PASSI_ANDROID_DISPLAY_VERSION=${{ inputs.display_version }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          # Offset the run number above the highest versionCode already on Play (154 as of v1.54)
          # so uploads never collide with an existing bundle. Keeps monotonically increasing.
          $versionCode = ${{ github.run_number }} + 1000
          "PASSI_ANDROID_VERSION_CODE=$versionCode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build signed Android App Bundle
        shell: pwsh
        env:
          PASSI_ANDROID_SIGNING_STORE_PASS: ${{ secrets.PASSI_ANDROID_SIGNING_STORE_PASS }}
          PASSI_ANDROID_SIGNING_KEY_PASS: ${{ secrets.PASSI_ANDROID_SIGNING_KEY_PASS }}
          PASSI_ANDROID_KEY_ALIAS: ${{ secrets.PASSI_ANDROID_KEY_ALIAS }}
        run: |
          Push-Location $env:ANDROID_NATIVE_DIR
          .\gradlew.bat :app:bundleRelease `
            -PPASSI_ANDROID_KEYSTORE_PATH="$env:PASSI_ANDROID_KEYSTORE_PATH" `
            -PPASSI_ANDROID_SIGNING_STORE_PASS="$env:PASSI_ANDROID_SIGNING_STORE_PASS" `
            -PPASSI_ANDROID_KEY_ALIAS="$env:PASSI_ANDROID_KEY_ALIAS" `
            -PPASSI_ANDROID_SIGNING_KEY_PASS="$env:PASSI_ANDROID_SIGNING_KEY_PASS" `
            -PPASSI_ANDROID_DISPLAY_VERSION="$env:PASSI_ANDROID_DISPLAY_VERSION" `
            -PPASSI_ANDROID_VERSION_CODE="$env:PASSI_ANDROID_VERSION_CODE" `
            --no-daemon
          Pop-Location

      - name: Locate generated AAB
        id: aab
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path android-native\app\build\outputs\bundle -Filter *.aab -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $bundle) {
            throw 'No Android App Bundle (.aab) was generated.'
          }

          "path=$($bundle.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          # Workspace-relative forward-slash glob: the upload action's glob matcher
          # cannot handle the absolute Windows path (backslashes) from the runner.
          releaseFiles: android-native/app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.release_status }}
          # Commit the edit without sending the whole edit for review. With the default (false),
          # commit tries to send changes for review, which needs broader permission than the
          # "Release to testing tracks" role and fails at commit with "caller does not have
          # permission" even though the bundle uploads fine. Not sending for review is correct for
          # internal testing (those releases don't go through review).
          changesNotSentForReview: true