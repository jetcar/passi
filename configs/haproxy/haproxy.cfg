global
  daemon
  log 127.0.0.1 local0
  log 127.0.0.1 local1 notice
  maxconn 4096
  tune.ssl.default-dh-param 2048


defaults
  log global
  retries 3
  maxconn 2000
  mode http
  option httplog
  option dontlognull
  timeout connect 5000
  timeout client 300000
  timeout server 300000

listen stats
  bind 127.0.0.1:9090
  balance
  mode http
  stats enable
  timeout connect 5000
  timeout client 30000
  timeout server 30000

frontend smtp_front
  bind *:25
  mode tcp
  option tcplog
  default_backend mailler_smtp_25

frontend submission_front
  bind *:587
  mode tcp
  option tcplog
  default_backend mailler_smtp_587

frontend smtps_front
  bind *:465
  mode tcp
  option tcplog
  default_backend mailler_smtp_465

frontend http_front
  bind *:80
  mode http
  
  # Route ACME challenge requests for Let's Encrypt (MUST be first)
  acl is_acme_challenge path_beg /.well-known/acme-challenge/
  use_backend certbot if is_acme_challenge
  
  # Redirect all other HTTP to HTTPS
  http-request redirect scheme https code 301

frontend https_front
  bind *:443 ssl crt /usr/local/etc/haproxy/cert/passi_cloud_haproxy.ca-bundle
  mode http
  option httplog
  option forwardfor
  http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
  http-request set-header X-Forwarded-Proto https if { ssl_fc }

  # Route ACME challenges to certbot (MUST be first)
  acl is_acme_challenge path_beg /.well-known/acme-challenge/
  use_backend certbot if is_acme_challenge

  acl is_openidc path_beg /openidc
  acl is_passiwebapi path_beg /passiapi
  acl is_mailler_base path -i /mailler
  acl is_mailler_base_prefix path_beg /mailler/
  acl is_mailler_callback_base path_beg /mailler/oauth2/authorize
  acl is_mailler_callback path_beg /webmail/oauth2/authorize
  acl is_mailler_webmail path -i /webmail
  acl is_mailler_webmail_prefix path_beg /webmail/
  acl is_mailler_auth path_beg /auth
  acl is_mailler_api path_beg /api
  acl is_mailler_ui path_beg /inbox /compose /settings
  acl is_mailler_asset path_beg /assets
  acl mailler_asset_ref hdr_sub(Referer) /webmail
  acl mailler_asset_ref hdr_sub(Referer) /inbox
  acl mailler_asset_ref hdr_sub(Referer) /compose
  acl mailler_asset_ref hdr_sub(Referer) /settings

  use_backend openidc if is_openidc
  use_backend passiwebapi if is_passiwebapi
  use_backend mailler_webmail if is_mailler_base
  use_backend mailler_webmail if is_mailler_base_prefix
  use_backend mailler_callback if is_mailler_callback_base
  use_backend mailler_callback if is_mailler_callback
  use_backend mailler_webmail if is_mailler_webmail
  use_backend mailler_webmail if is_mailler_webmail_prefix
  use_backend mailler_backend if is_mailler_auth
  use_backend mailler_backend if is_mailler_api
  use_backend mailler_backend if is_mailler_ui
  use_backend mailler_backend if is_mailler_asset mailler_asset_ref

  default_backend http_back

backend http_back
  mode http
  server webapp_server webapp:5002 ssl verify none

backend certbot
  mode http
  server certbot_server certbot:80 maxconn 32 check

backend openidc
  mode http
  server open_idc openidc:5005 ssl verify none

backend passiwebapi
  mode http
  server passiwebapi_server passiwebapi:5004

backend mailler_backend
  mode http
  option httpchk GET /health
  http-request set-header X-Scheme https if { ssl_fc }
  http-request set-header Host %[hdr(host)]
  server mailler_backend_server mailler-backend:3000 check

backend mailler_webmail
  mode http
  option httpchk GET /health
  http-request set-header X-Scheme https if { ssl_fc }
  http-request set-header Host %[hdr(host)]
  http-request replace-path ^/webmail/?(.*)$ /\1
  server mailler_backend_server mailler-backend:3000 check

backend mailler_callback
  mode http
  option httpchk GET /health
  http-request set-header X-Scheme https if { ssl_fc }
  http-request set-header Host %[hdr(host)]
  server mailler_backend_server mailler-backend:3000 check

backend mailler_smtp_25
  mode tcp
  server mailler_backend_smtp_25 mailler-backend:25 check

backend mailler_smtp_587
  mode tcp
  server mailler_backend_smtp_587 mailler-backend:587 check

backend mailler_smtp_465
  mode tcp
  server mailler_backend_smtp_465 mailler-backend:465 check
