version: '3.4'

services:
  redis:
    ports:
      - "6379:6379"
    networks:
      - haproxy_net

  database:
    logging:
      driver: json-file
    ports:
      - "5432:5432"
    networks:
      - haproxy_net
    env_file:
      - ./configs/variables/dev.env
    volumes:
      - type: bind
        source: ../db-data/
        target: /var/lib/postgresql/data/

  haproxy:
    networks:
      - haproxy_net
    volumes:
      - ./configs/cert:/usr/local/etc/haproxy/cert
      - ./configs/haproxy:/usr/local/etc/haproxy

  webapp:
    networks:
      - haproxy_net
    build:
      context: .
      dockerfile: WebApp/Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - ./configs/variables/dev.env
      - ../passi_config/sendgrid.env
    volumes:
      - ../creds:/home/creds
    deploy:
      mode: replicated
      replicas: 1
      endpoint_mode: vip

  openidc:
    networks:
      - haproxy_net
    build:
      context: .
      dockerfile: OpenIDC/Dockerfile
    ports:
      - "5005:5005"
    env_file:
      - ./configs/variables/dev.env
    volumes:
      - ./configs/identity:/myapp/cert
      - ../creds:/home/creds
    # depends_on:
    #   - common_image
    deploy:
      mode: replicated
      replicas: 1
      endpoint_mode: vip

  passiwebapi:
    networks:
      - haproxy_net
    build:
      context: .
      dockerfile: passiwebapi/Dockerfile
    ports:
      - "5004:5004"
    env_file:
      - ./configs/variables/dev.env
    volumes:
      - ../creds:/home/creds
    deploy:
      mode: replicated
      replicas: 1
      endpoint_mode: vip

  mailler-backend:
    env_file:
      - ./configs/variables/mailler.env

  porkbun-ddns:
    deploy:
      mode: replicated
      replicas: 0
      endpoint_mode: vip

  wireguard:
    deploy:
      mode: replicated
      replicas: 0
      endpoint_mode: vip
